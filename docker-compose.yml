##############################################################
# Docker Compose – Desafio Fullstack Integrado
# Sobe: PostgreSQL + Backend Spring Boot + Frontend Angular
##############################################################
services:

  # ────────────────────────────────
  # Banco de dados PostgreSQL 15
  # ────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: desafio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       desafio
      POSTGRES_USER:     desafio
      POSTGRES_PASSWORD: desafio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U desafio -d desafio"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - desafio-net

  # ────────────────────────────────
  # Backend Spring Boot
  # ────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: backend-module/Dockerfile
    container_name: desafio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/desafio
      SPRING_DATASOURCE_USERNAME: desafio
      SPRING_DATASOURCE_PASSWORD: desafio
      SERVER_PORT:                8080
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    healthcheck:
      test:     ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  5
    networks:
      - desafio-net

  # ────────────────────────────────
  # Frontend Angular (Nginx)
  # ────────────────────────────────
  frontend:
    build:
      context:    frontend
      dockerfile: Dockerfile
    container_name: desafio-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    networks:
      - desafio-net

# ─── Volumes e redes ───
volumes:
  pgdata:
    driver: local

networks:
  desafio-net:
    driver: bridge
